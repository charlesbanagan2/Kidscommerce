<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="150" viewBox="0 0 1000 150" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#59b5fc"/>
      <stop offset="100%" stop-color="#0066ff"/>
    </linearGradient>
    <pattern id="p" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <rect width="40" height="40" fill="rgba(255,255,255,0.1)"/>
      <circle cx="0" cy="0" r="1.2" fill="rgba(255,255,255,0.55)"/>
      <circle cx="20" cy="20" r="1.2" fill="rgba(255,255,255,0.55)"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="1000" height="150" fill="url(#g)"/>
  <rect x="0" y="0" width="1000" height="150" fill="url(#p)"/>
  <text x="500" y="92" text-anchor="middle" font-family="Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="28" fill="rgba(255,255,255,0.85)">Browse our categories</text>
</svg>
