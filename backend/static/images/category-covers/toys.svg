<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="300" viewBox="0 0 1400 300" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb3a1"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <g id="spark" fill="#ffffff" opacity="0.65">
      <polygon points="4,0 5,3 8,4 5,5 4,8 3,5 0,4 3,3"/>
    </g>
    <g id="cube" opacity="0.35">
      <rect x="0" y="0" width="26" height="26" rx="6" fill="rgba(255,255,255,0.55)"/>
      <rect x="6" y="6" width="26" height="26" rx="6" fill="rgba(255,255,255,0.25)"/>
    </g>
  </defs>
  <rect width="1400" height="300" fill="url(#bg)"/>

  <!-- playful accents -->
  <g>
    <use href="#spark" x="120" y="60"/>
    <use href="#spark" x="180" y="40"/>
    <use href="#spark" x="520" y="70"/>
    <use href="#spark" x="760" y="60"/>
    <use href="#spark" x="980" y="50"/>
  </g>
  <g>
    <use href="#cube" x="260" y="160"/>
    <use href="#cube" x="320" y="150"/>
    <use href="#cube" x="1080" y="160"/>
    <use href="#cube" x="1140" y="150"/>
  </g>

  <path d="M0,245 C260,215 520,280 780,245 C1040,215 1220,275 1400,245 L1400,300 L0,300 Z" fill="#ffffff" opacity="0.18"/>
</svg>
