<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="300" viewBox="0 0 1400 300" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d3fde6"/>
      <stop offset="100%" stop-color="#b2f0ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8bd7f5"/>
      <stop offset="100%" stop-color="#7ee5c9"/>
    </linearGradient>
    <g id="block" opacity="0.35">
      <rect x="0" y="0" width="30" height="30" rx="6" fill="#23a6d5"/>
      <rect x="36" y="0" width="30" height="30" rx="6" fill="#21c39e"/>
      <rect x="18" y="-20" width="30" height="30" rx="6" fill="#8bd7f5"/>
    </g>
    <g id="pencil" fill="none" stroke="#1f9bb8" stroke-width="3" opacity="0.6">
