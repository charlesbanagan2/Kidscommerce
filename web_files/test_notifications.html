<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Kids Playground Notifications</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="static/css/alert-modern.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Comic Sans MS', cursive, sans-serif;
        }
        .test-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 2rem;
            margin: 2rem auto;
            max-width: 800px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }
        .btn-test {
            margin: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            border: none;
            color: white;
        }
        .btn-test:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        .btn-success { background: linear-gradient(135deg, #ff6b9d 0%, #feca57 100%); }
        .btn-error { background: linear-gradient(135deg, #ee5a6f 0%, #f368e0 100%); }
        .btn-warning { background: linear-gradient(135deg, #f9ca24 0%, #f0932b 100%); }
        .btn-info { background: linear-gradient(135deg, #48dbfb 0%, #0abde3 100%); }
        .btn-primary { background: linear-gradient(135deg, #a29bfe 0%, #6c5ce7 100%); }
        .btn-danger { background: linear-gradient(135deg, #ff6348 0%, #ff4757 100%); }
    </style>
</head>
<body>
    <div class="container">
        <div class="test-container">
            <h1 class="text-center mb-4" style="color: #5f3dc4;">
                <i class="fas fa-palette"></i> Kids Playground Notification Test
            </h1>
            <p class="text-center mb-4">Click the buttons below to test the new colorful notifications!</p>
            
            <div class="text-center">
                <button class="btn-test btn-success" onclick="testSuccess()">
                    <i class="fas fa-check-circle"></i> Success Notification
                </button>
                <button class="btn-test btn-error" onclick="testError()">
                    <i class="fas fa-times-circle"></i> Error Notification
                </button>
                <button class="btn-test btn-warning" onclick="testWarning()">
                    <i class="fas fa-exclamation-triangle"></i> Warning Notification
                </button>
                <button class="btn-test btn-info" onclick="testInfo()">
                    <i class="fas fa-info-circle"></i> Info Notification
                </button>
                <button class="btn-test btn-primary" onclick="testPrimary()">
                    <i class="fas fa-star"></i> Primary Notification
                </button>
                <button class="btn-test btn-danger" onclick="testDanger()">
                    <i class="fas fa-fire"></i> Danger Notification
                </button>
            </div>

            <div class="mt-4">
                <h3 style="color: #5f3dc4;">Custom Toast Test</h3>
                <div class="text-center">
                    <button class="btn-test btn-success" onclick="testCustomToast('success')">
                        <i class="fas fa-check"></i> Custom Success
                    </button>
                    <button class="btn-test btn-error" onclick="testCustomToast('error')">
                        <i class="fas fa-times"></i> Custom Error
                    </button>
                    <button class="btn-test btn-warning" onclick="testCustomToast('warning')">
                        <i class="fas fa-exclamation"></i> Custom Warning
                    </button>
                    <button class="btn-test btn-info" onclick="testCustomToast('info')">
                        <i class="fas fa-info"></i> Custom Info
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="static/js/alert-modern.js"></script>
    <script>
        function testSuccess() {
            modernAlert.success('Order accepted! Your rainbow unicorn is on its way! 🦄', 'Success!');
        }

        function testError() {
            modernAlert.error('Oops! The magic wand needs new batteries! 🪄', 'Magic Error');
        }

        function testWarning() {
            modernAlert.warning('Warning! Gummy bears are running low! 🐻', 'Sweet Alert');
        }

        function testInfo() {
            modernAlert.info('Fun fact: Slides are 100% more fun than stairs! 🎢', 'Playground Info');
        }

        function testPrimary() {
            modernAlert.info('You found the golden ticket! 🎟️', 'Golden Moment');
        }

        function testDanger() {
            modernAlert.error('The dragon is not happy! 🔥', 'Dragon Alert');
        }

        function testCustomToast(type) {
            const messages = {
                success: 'Order accepted! Your rainbow unicorn is on its way! 🦄',
                error: 'Oops! The magic wand needs new batteries! 🪄',
                warning: 'Warning! Gummy bears are running low! 🐻',
                info: 'Fun fact: Slides are 100% more fun than stairs! 🎢'
            };
            
            // Create a custom toast element
            const toast = document.createElement('div');
            toast.className = `custom-toast custom-toast-${type}`;
            toast.innerHTML = `
                <div class="custom-toast-content">
                    <div class="custom-toast-icon">${type === 'success' ? '✓' : type === 'error' ? '✕' : type === 'warning' ? '!' : 'i'}</div>
                    <div class="custom-toast-message">${messages[type]}</div>
                    <button class="custom-toast-close" onclick="this.parentElement.parentElement.remove()">✕</button>
                </div>
            `;
            
            document.body.appendChild(toast);
            
            // Show the toast
            setTimeout(() => toast.classList.add('show'), 100);
            
            // Auto remove after 5 seconds
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 5000);
        }
    </script>
</body>
</html>
