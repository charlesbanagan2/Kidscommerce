<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="300" viewBox="0 0 1400 300" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5e9d8"/>
      <stop offset="100%" stop-color="#e9ddcc"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d8b089"/>
      <stop offset="100%" stop-color="#e6c7a9"/>
    </linearGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0 L0 0 0 20" fill="none" stroke="rgba(0,0,0,0.04)"/>
    </pattern>
  </defs>
  <rect width="1400" height="300" fill="url(#bg)"/>
  <rect width="1400" height="300" fill="url(#grid)"/>

  <!-- crib silhouette -->
  <g transform="translate(150,115)">
    <rect x="0" y="40" width="260" height="80" rx="12" fill="url(#wood)" opacity="0.8"/>
    <g stroke="#b78b62" stroke-width="4" opacity="0.6">
      <line x1="20" y1="45" x2="20" y2="120"/>
      <line x1="45" y1="45" x2="45" y2="120"/>
      <line x1="70" y1="45" x2="70" y2="120"/>
      <line x1="95" y1="45" x2="95" y2="120"/>
      <line x1="120" y1="45" x2="120" y2="120"/>
      <line x1="145" y1="45" x2="145" y2="120"/>
      <line x1="170" y1="45" x2="170" y2="120"/>
      <line x1="195" y1="45" x2="195" y2="120"/>
      <line x1="220" y1="45" x2="220" y2="120"/>
      <line x1="245" y1="45" x2="245" y2="120"/>
    </g>
  </g>

  <!-- soft rug ellipse -->
  <ellipse cx="350" cy="210" rx="180" ry="18" fill="#d9c8b4" opacity="0.35"/>

  <!-- gentle wave overlay -->
  <path d="M0,240 C260,210 520,260 780,235 C1040,210 1220,260 1400,235 L1400,300 L0,300 Z" fill="#fff" opacity="0.25"/>
</svg>
