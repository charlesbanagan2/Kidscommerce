name: kids_commerce
description: Kids Kingdom - Kids & Baby Store E-Commerce Flutter App
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  image_picker: ^1.1.2
  provider: ^6.0.0
  http: ^1.1.0
  shared_preferences: ^2.0.0
  email_validator: ^3.0.0
  intl: ^0.20.2
  video_player: ^2.9.2
  video_thumbnail: ^0.5.3
  socket_io_client: ^3.1.4
  google_sign_in: 6.2.1
  flutter_slidable: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
