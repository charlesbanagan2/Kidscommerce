name: kids_commerce
description: Kids & Baby Store E-Commerce Flutter App - Available on Android and Web
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  image_picker: ^1.1.2
  provider: ^6.0.0
  http: ^1.1.0
  shared_preferences: ^2.0.0
  email_validator: ^2.1.0
  intl: ^0.19.0
  video_player: ^2.9.2
  video_thumbnail: ^0.5.3
  socket_io_client: ^2.0.0
  lucide_icons: ^0.257.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
